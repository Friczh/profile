<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Your Name — Developer & Designer" />
  <title>Your Name</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Google+Sans+Display:wght@400;500;700&display=swap"
    rel="stylesheet" />

  <script type="module" src="https://esm.sh/@material/web@2.2.0/all.js"></script>
  <script type="module">
    import { styles as typescaleStyles }
      from 'https://esm.sh/@material/web@2.2.0/typography/md-typescale-styles.js';
    document.adoptedStyleSheets.push(typescaleStyles.styleSheet);
  </script>

  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

  <!-- Page loader -->
  <md-linear-progress id="page-loader" indeterminate aria-label="Loading"
    style="position:fixed;top:0;left:0;right:0;z-index:9999;"></md-linear-progress>

  <!-- Scrim -->
  <div class="nav-scrim" id="nav-scrim" aria-hidden="true"></div>

  <!-- ══ NAVIGATION DRAWER ══════════════════════════════════════ -->
  <nav class="nav-drawer" id="nav-drawer"
       role="navigation" aria-label="Site navigation" aria-hidden="true">

    <div class="drawer-header">
      <div class="drawer-wordmark">
        <svg class="drawer-logo-svg" viewBox="0 0 256 256" fill="none" aria-hidden="true">
          <path fill="currentColor" d="M253.85 4.9a3.5 3.5 0 0 0-3.2-4.9h-24.7a2.5 2.5 0 0 0-2.29 1.5L130.3 214.16a2.5 2.5 0 0 1-4.58 0L32.34 1.5a2.5 2.5 0 0 0-2.3-1.5H5.37a3.5 3.5 0 0 0-3.21 4.9c14.63 33.4 99.32 226.71 109.1 249a3.5 3.5 0 0 0 3.2 2.1h27.1a3.5 3.5 0 0 0 3.2-2.1z"/>
          <path fill="var(--md-sys-color-primary)" d="M130.6 131.75a3 3 0 0 1-5.2 0L51.93 4.5a3 3 0 0 1 2.6-4.5h146.94a3 3 0 0 1 2.6 4.5z"/>
        </svg>
        <span class="md-typescale-title-large" id="drawer-name">Your Name</span>
      </div>
      <md-icon-button id="drawer-close-btn" aria-label="Close navigation">
        <md-icon>close</md-icon>
      </md-icon-button>
    </div>

    <md-divider></md-divider>

    <ul class="nav-list" role="list">
      <li><button class="nav-item" data-target="hero">
        <span class="nav-item-icon material-symbols-rounded" aria-hidden="true">home</span>
        <span class="nav-item-label md-typescale-label-large">Home</span>
        <md-ripple></md-ripple>
      </button></li>
      <li><button class="nav-item" data-target="projects">
        <span class="nav-item-icon material-symbols-rounded" aria-hidden="true">folder_open</span>
        <span class="nav-item-label md-typescale-label-large">Projects</span>
        <md-ripple></md-ripple>
      </button></li>
      <li><button class="nav-item" data-target="about">
        <span class="nav-item-icon material-symbols-rounded" aria-hidden="true">person</span>
        <span class="nav-item-label md-typescale-label-large">About</span>
        <md-ripple></md-ripple>
      </button></li>
      <li><button class="nav-item" data-target="contact">
        <span class="nav-item-icon material-symbols-rounded" aria-hidden="true">mail</span>
        <span class="nav-item-label md-typescale-label-large">Contact</span>
        <md-ripple></md-ripple>
      </button></li>
    </ul>

    <div class="drawer-footer">
      <span class="md-typescale-body-small" style="opacity:.45;">Built with MD3 ✦</span>
    </div>
  </nav>

  <!-- ══ TOP APP BAR ════════════════════════════════════════════ -->
  <header class="top-app-bar" id="top-app-bar">

    <div class="app-bar-leading">
      <md-icon-button id="menu-btn" aria-label="Open navigation"
                      aria-expanded="false" aria-controls="nav-drawer">
        <md-icon id="menu-icon">menu</md-icon>
      </md-icon-button>
    </div>

    <a class="app-bar-brand" href="#hero" aria-label="Go to top">
      <svg class="brand-logo" viewBox="0 0 256 256" fill="none" aria-hidden="true">
        <path fill="currentColor" d="M253.85 4.9a3.5 3.5 0 0 0-3.2-4.9h-24.7a2.5 2.5 0 0 0-2.29 1.5L130.3 214.16a2.5 2.5 0 0 1-4.58 0L32.34 1.5a2.5 2.5 0 0 0-2.3-1.5H5.37a3.5 3.5 0 0 0-3.21 4.9c14.63 33.4 99.32 226.71 109.1 249a3.5 3.5 0 0 0 3.2 2.1h27.1a3.5 3.5 0 0 0 3.2-2.1z"/>
        <path fill="var(--md-sys-color-primary)" d="M130.6 131.75a3 3 0 0 1-5.2 0L51.93 4.5a3 3 0 0 1 2.6-4.5h146.94a3 3 0 0 1 2.6 4.5z"/>
      </svg>
      <span class="brand-name md-typescale-title-large" id="appbar-name">Your Name</span>
    </a>

    <div class="app-bar-trailing">
      <nav class="appbar-tabs" aria-label="Quick navigation">
        <button class="appbar-tab" data-target="projects">Projects<md-ripple></md-ripple></button>
        <button class="appbar-tab" data-target="about">About<md-ripple></md-ripple></button>
        <button class="appbar-tab" data-target="contact">Contact<md-ripple></md-ripple></button>
      </nav>
      <md-icon-button id="theme-btn" aria-label="Switch theme" title="Switch theme">
        <md-icon id="theme-icon">dark_mode</md-icon>
      </md-icon-button>
    </div>
  </header>

  <!-- ══ PAGE WRAPPER ═══════════════════════════════════════════ -->
  <div class="page-wrapper" id="page-wrapper">
    <main id="main-content">

      <!-- HERO -->
      <section class="section section--hero" id="hero" aria-labelledby="hero-heading">
        <div class="hero-inner">

          <div class="hero-text">
            <h1 class="hero-heading md-typescale-display-medium" id="hero-heading"></h1>
            <p  class="hero-sub md-typescale-body-large" id="hero-sub"></p>
            <div class="hero-actions">
              <md-filled-button id="hero-cta-primary" data-target="projects">
                <md-icon slot="icon">folder_open</md-icon>View Projects
              </md-filled-button>
              <md-outlined-button id="hero-cta-secondary" data-target="contact">
                <md-icon slot="icon">mail_outline</md-icon>Contact
              </md-outlined-button>
            </div>
            <div class="hero-socials" id="hero-socials"></div>
          </div>

          <div class="hero-visual" aria-hidden="true">
            <div class="hero-glow"></div>
            <div class="hero-card">
              <div class="hero-card-topbar">
                <div class="hero-card-dots"><span></span><span></span><span></span></div>
              </div>
              <div class="hero-card-avatar-wrap">
                <img class="hero-card-avatar" id="hero-avatar-img"
                     src="assets/avatar.jpg" alt=""
                     onerror="this.hidden=true;document.getElementById('avatar-fallback').hidden=false;" />
                <div class="hero-card-avatar hero-card-avatar--fallback" id="avatar-fallback" hidden>
                  <span class="material-symbols-rounded">person</span>
                </div>
              </div>
              <p class="md-typescale-title-medium hero-card-name" id="hero-card-name"></p>
              <p class="md-typescale-body-small hero-card-role" id="hero-card-role"></p>
              <div class="hero-card-chips" id="hero-card-chips"></div>
            </div>
          </div>

        </div>
        <div class="scroll-hint" aria-hidden="true">
          <span class="material-symbols-rounded">expand_more</span>
        </div>
      </section>

      <!-- ABOUT (centered text block — ReVanced style) -->
      <section class="section section--about" id="about" aria-labelledby="about-heading">
        <div class="section-inner section-inner--narrow">
          <div class="about-logo-row" aria-hidden="true">
            <svg class="about-logo-svg" viewBox="0 0 256 256" fill="none">
              <path fill="var(--md-sys-color-on-surface)" d="M253.85 4.9a3.5 3.5 0 0 0-3.2-4.9h-24.7a2.5 2.5 0 0 0-2.29 1.5L130.3 214.16a2.5 2.5 0 0 1-4.58 0L32.34 1.5a2.5 2.5 0 0 0-2.3-1.5H5.37a3.5 3.5 0 0 0-3.21 4.9c14.63 33.4 99.32 226.71 109.1 249a3.5 3.5 0 0 0 3.2 2.1h27.1a3.5 3.5 0 0 0 3.2-2.1z"/>
              <path fill="var(--md-sys-color-primary)" d="M130.6 131.75a3 3 0 0 1-5.2 0L51.93 4.5a3 3 0 0 1 2.6-4.5h146.94a3 3 0 0 1 2.6 4.5z"/>
            </svg>
          </div>
          <h2 class="md-typescale-headline-large about-name" id="about-heading"></h2>
          <div class="about-paragraphs" id="about-text"></div>
        </div>
      </section>

      <!-- PROJECTS -->
      <section class="section section--projects" id="projects" aria-labelledby="projects-heading">
        <div class="section-inner">
          <div class="section-header">
            <h2 class="md-typescale-headline-medium section-title" id="projects-heading">Projects</h2>
            <p  class="md-typescale-body-large section-subtitle" id="projects-subtitle"></p>
          </div>
          <div class="projects-grid" id="projects-grid" role="list"></div>
        </div>
      </section>

      <!-- SKILLS -->
      <section class="section section--skills" id="skills" aria-labelledby="skills-heading">
        <div class="section-inner section-inner--narrow">
          <h2 class="md-typescale-headline-medium section-title" id="skills-heading">Skills &amp; Tools</h2>
          <div class="skills-chips" id="skills-chips" role="list"></div>
        </div>
      </section>

      <!-- CONTACT -->
      <section class="section section--contact" id="contact" aria-labelledby="contact-heading">
        <div class="section-inner">
          <div class="section-header">
            <h2 class="md-typescale-headline-medium section-title" id="contact-heading">Get In Touch</h2>
            <p  class="md-typescale-body-large section-subtitle">Let's build something great together</p>
          </div>
          <div class="contact-grid" id="contact-grid"></div>
        </div>
      </section>

    </main>

    <!-- ══ FOOTER (ReVanced two-column) ═══════════════════════════ -->
    <footer class="site-footer">
      <div class="footer-inner">

        <div class="footer-brand">
          <div class="footer-wordmark">
            <svg class="footer-logo" viewBox="0 0 256 256" fill="none" aria-hidden="true">
              <path fill="var(--md-sys-color-on-surface)" d="M253.85 4.9a3.5 3.5 0 0 0-3.2-4.9h-24.7a2.5 2.5 0 0 0-2.29 1.5L130.3 214.16a2.5 2.5 0 0 1-4.58 0L32.34 1.5a2.5 2.5 0 0 0-2.3-1.5H5.37a3.5 3.5 0 0 0-3.21 4.9c14.63 33.4 99.32 226.71 109.1 249a3.5 3.5 0 0 0 3.2 2.1h27.1a3.5 3.5 0 0 0 3.2-2.1z"/>
              <path fill="var(--md-sys-color-primary)" d="M130.6 131.75a3 3 0 0 1-5.2 0L51.93 4.5a3 3 0 0 1 2.6-4.5h146.94a3 3 0 0 1 2.6 4.5z"/>
            </svg>
            <span class="md-typescale-title-medium" id="footer-name">Your Name</span>
          </div>
          <p class="md-typescale-body-small footer-copy" id="footer-copy"></p>
        </div>

        <div class="footer-col">
          <p class="footer-col-title md-typescale-label-large">Pages</p>
          <ul class="footer-link-list" role="list">
            <li><button class="footer-link md-typescale-body-medium" data-target="hero">Home<md-ripple></md-ripple></button></li>
            <li><button class="footer-link md-typescale-body-medium" data-target="projects">Projects<md-ripple></md-ripple></button></li>
            <li><button class="footer-link md-typescale-body-medium" data-target="about">About<md-ripple></md-ripple></button></li>
            <li><button class="footer-link md-typescale-body-medium" data-target="contact">Contact<md-ripple></md-ripple></button></li>
          </ul>
        </div>

        <div class="footer-col" id="footer-socials-col">
          <p class="footer-col-title md-typescale-label-large">Socials</p>
          <ul class="footer-link-list" id="footer-socials-list" role="list"></ul>
        </div>

      </div>
    </footer>

  </div><!-- /.page-wrapper -->

  <md-fab class="back-to-top-fab" id="back-to-top-fab"
          aria-label="Back to top" size="small" style="display:none;">
    <md-icon slot="icon">keyboard_arrow_up</md-icon>
  </md-fab>

  <script src="js/main.js"    defer></script>
  <script src="js/content.js" defer></script>
</body>
</html>
